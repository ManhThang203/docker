services:
  blog-ui:
    build: ./blog-ui
    restart: always
    ports:
      - 3000:80
  blog-admin:
    build: ./blog-admin
    restart: always
    ports:
      - 3001:80
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - D:/Dự án/Blog/blog-admin:/app
      - /app/node_modules

  blog-api:
    build: ./blog-api
    restart: always
    ports:
      - 4000:4000
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REDIS_URL=${REDIS_URL}
    volumes:
      - D:/Dự án/Blog/blog-api:/app
      - /app/node_modules
    depends_on:
      - app-db
      - app-redis

  app-db:
    image: mysql:oraclelinux9
    restart: always
    ports:
      - 23306:3306
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: blog_dev
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    volumes:
      - D:/databases/Blog-db/data:/var/lib/mysql

  app-redis:
    image: redis:alpine3.23
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
